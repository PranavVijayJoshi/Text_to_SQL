version: "3.9"

services:

  # ── PostgreSQL with pgvector extension ──────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16        # official pgvector image — no manual setup needed
    container_name: sql_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    ports:
      - "5432:5432"                      # expose to host for local debugging
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists across restarts
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # runs once on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── SQL Agent FastAPI app ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sql_agent_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env                             # all secrets come from .env — never hardcoded
    environment:
      # Override DB_HOST to point to the db service name, not localhost
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy       # wait for postgres to be ready before starting
    volumes:
      - .:/app                           # mount source for development hot reload
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload


volumes:
  postgres_data:
